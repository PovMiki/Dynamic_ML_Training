version: '3.8'
services:

  ml-app:
    build: .
    container_name: ntpd-ml-container
    ports:
      - "8080:8080"
    networks:
      - ml-network
    depends_on:
      - redis-db

  redis-db:
    image: "redis:alpine"
    container_name: redis-cache
    ports:
      - "6379:6379" #do bazy danych redis
    networks:
      - ml-network

  airflow:
    image: apache/airflow:2.10.2-python3.11
    container_name: airflow-container
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - _PIP_ADDITIONAL_REQUIREMENTS=virtualenv
    volumes:
      - ./dags:/opt/airflow/dags
    ports:
      - "8085:8080"
    networks:
      - ml-network
    command: standalone

networks:
  ml-network:
    driver: bridge